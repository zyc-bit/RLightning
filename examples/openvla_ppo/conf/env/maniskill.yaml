- name: "maniskill_for_openvla-put_on_plate"
  task: "PutOnPlateInScene25Main-v3"
  backend: "maniskill"
  num_workers: 1
  num_envs: 32
  num_cpus: 1
  num_gpus: 1
  max_episode_steps: 80
  seed: 0
  
  auto_reset: True
  ignore_terminations: False
  use_rel_reward: True
  use_fixed_reset_state_ids: False
  policy_setup: "widowx_bridge"

  num_action_chunks: ${policy.model_cfg.num_action_chunks}
  action_dim: ${policy.model_cfg.action_dim}
  init_params:
    id: ${..task}
    num_envs: ${..num_envs}
    obs_mode: "rgb+segmentation"
    control_mode: None
    sim_backend: "gpu"
    sim_config:
      sim_freq: 500
      control_freq: 5
    max_episode_steps: ${..max_episode_steps}
    sensor_configs:
      shader_pack: "default"
    render_mode: all

  video_cfg:
    save_video: False
    info_on_video: True
    video_base_dir: ${log.log_dir}/${log.project}/${log.name}/video/train
  
  evaluate_cfg:
    # obj_set: "test"
    auto_reset: True
    ignore_terminations: True
    use_fixed_reset_state_ids: True
    video_cfg:
      save_video: True
      video_base_dir: ${log.log_dir}/${log.project}/${log.name}/video/eval
defaults:
  - env: single_task
  - train: rsl_rl
  - policy: rsl_rl_ppo
  - buffer: rollout
  - cluster: 1train_1eval
  - _self_

log:
  level: INFO
  backend: tensorboard
  log_dir: "runs"
  project: "rlightning"
  name: wbc_tracking

cluster:
  train_worker_num: 1
  eval_worker_num: 3

env:
  num_envs: 4096
  num_workers: ${cluster.eval_worker_num}

engine: async_rsl
debug: True
verbose: False
